<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>API Users Table</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #333;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .me {
            background-color: #d1ffd1;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>User Information Table</h2>

<table id="userTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Username</th>
            <th>Email</th>
            <th>Zipcode</th>
        </tr>
    </thead>
    <tbody>
        <tr class="me">
            <td>0</td>
            <td>Keith Amiel</td>
            <td>Barroquillo</td>
            <td>Amel</td>
            <td>Amel@email.com</td>
            <td>7214</td>
        </tr>
    </tbody>
</table>

<script>
    const table = document.getElementById("userTable").querySelector("tbody");

    fetch("https://jsonplaceholder.typicode.com/users")
        .then(response => response.json())
        .then(data => {
            data.forEach(user => {
                let nameParts = user.name.split(" ");
                let firstName = nameParts[0];
                let lastName = nameParts.slice(1).join(" ");

                let row = `
                    <tr>
                        <td>${user.id}</td>
                        <td>${firstName}</td>
                        <td>${lastName}</td>
                        <td>${user.username}</td>
                        <td>${user.email}</td>
                        <td>${user.address.zipcode}</td>
                    </tr>
                `;

                table.innerHTML += row;
            });
        })
        .catch(error => console.error("Error fetching data:", error));
</script>

</body>
</html>
